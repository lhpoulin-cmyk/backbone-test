# window|profile|start_percent|end_percent|interval
#
# Percent windows are scaled against RUN_DURATION. For a one-hour run, the
# personal profile maps to:
# - 0-1m: every 10s
# - 1-6m: every 30s
# - 6-16m: every 1m
# - 16m-end: every 10m
#
# For other durations, the same proportions are preserved.

window|default|0|100|10m

window|personal|0|1.6667|10s
window|personal|1.6667|10|30s
window|personal|10|26.6667|1m
window|personal|26.6667|100|10m
