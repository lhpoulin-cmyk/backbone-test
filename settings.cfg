# Global settings for the generic backbone test runbook.
# Format: KEY=VALUE, comments allowed with '#'.

TEST_NAME=backbone-test
ENGINE=pattern-dd
REPORT_INTERVAL_SECONDS=600
THEORETICAL_BPS=1250000000
REPORT_BASE=/tmp/backbone-test-reports/backbone-test
NOTIFY_HELPER=/usr/local/bin/notify_ntfy.sh

ALLOW_DESTRUCTIVE_WRITES=false
ALLOW_MOUNT_CHANGES=false
FAIL_ON_WRONG_ROUTE=true
REQUIRE_EXPECTED_SUBNET=true
EXPECTED_DATA_SUBNET_PREFIX=10.10.100.

